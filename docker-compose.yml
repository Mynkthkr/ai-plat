# ============================================================
# AI Pulse — Docker Compose (Development & Production)
# ============================================================

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aipulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/aipulse?schema=public"
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # Cron Job Runner (optional — for self-hosted cron)
  cron:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: ["node", "scripts/cron-runner.js"]
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/aipulse?schema=public"
      NEXT_PUBLIC_APP_URL: "http://app:3000"
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      - app

volumes:
  pgdata:
